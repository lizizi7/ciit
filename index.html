<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>常州工业职业技术学院AI智能体汇报</title>
    <script type="module" crossorigin src="./assets/index-D9h_BwJ2.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D9SSWCGV.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 页面sections重新排序脚本
      // 目标顺序：项目背景 → 同类案例 → 语料库建设 → 数据分析 → 智能体功能 → 形象设计 → 未来规划
      const targetOrder = ['background', 'cases', 'corpus', 'analytics', 'features', 'design', 'roadmap'];
      
      function reorderSections() {
        const root = document.getElementById('root');
        if (!root) return;
        
        // 获取所有section元素
        const sections = Array.from(root.querySelectorAll('section[id]'));
        
        if (sections.length === 0) {
          // 如果还没有加载，稍后重试
          setTimeout(reorderSections, 500);
          return;
        }
        
        // 创建id到元素的映射
        const sectionMap = {};
        sections.forEach(section => {
          sectionMap[section.id] = section;
        });
        
        // 获取主容器（通常是root的第一个子元素）
        const mainContainer = root.firstElementChild;
        if (!mainContainer) return;
        
        // 按目标顺序重新排列
        targetOrder.forEach(id => {
          if (sectionMap[id]) {
            mainContainer.appendChild(sectionMap[id]);
          }
        });
        
        console.log('✓ Sections reordered successfully');
        console.log('New order:', targetOrder);
      }
      
      // 页面加载完成后执行
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', reorderSections);
      } else {
        // DOM已加载
        setTimeout(reorderSections, 100);
      }
      
      // 监听root变化，重新排序
      const observer = new MutationObserver(() => {
        const sections = document.querySelectorAll('section[id]');
        if (sections.length === 7) {
          observer.disconnect();
          reorderSections();
        }
      });
      
      const root = document.getElementById('root');
      if (root) {
        observer.observe(root, { childList: true, subtree: true });
      }
    </script>
  </body>
</html>
