<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>常州工业职业技术学院AI智能体汇报</title>
    <script type="module" crossorigin src="./assets/index-D9h_BwJ2.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D9SSWCGV.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 页面sections重新排序脚本
      // 目标顺序：Navbar → Hero → Background → Cases → Corpus → Analytics → Features → Design → Roadmap → Footer

      function reorderSections() {
        const root = document.getElementById('root');
        if (!root) return;

        // 获取主容器（通常是root的第一个子元素）
        const mainContainer = root.firstElementChild;
        if (!mainContainer) return;

        // 获取所有需要排序的元素
        const navbar = mainContainer.querySelector('nav, header');
        const hero = mainContainer.querySelector('[class*="hero"], section:first-of-type');
        const footer = mainContainer.querySelector('footer');

        // 按目标顺序排列所有section
        const sections = Array.from(mainContainer.querySelectorAll('section[id]'));
        const sectionOrder = ['background', 'cases', 'corpus', 'analytics', 'features', 'design', 'roadmap'];

        // 创建映射
        const sectionMap = {};
        sections.forEach(section => {
          sectionMap[section.id] = section;
        });

        // 清空容器（保留Navbar和Hero，它们位置不变）
        // 将section按目标顺序重新排列
        sectionOrder.forEach(id => {
          if (sectionMap[id]) {
            mainContainer.appendChild(sectionMap[id]);
          }
        });

        // 确保Footer在最后
        if (footer) {
          mainContainer.appendChild(footer);
        }

        console.log('Sections reordered successfully');
      }

      // 页面加载完成后执行
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', reorderSections);
      } else {
        setTimeout(reorderSections, 100);
      }

      // 监听root变化，重新排序
      const observer = new MutationObserver(() => {
        const sections = document.querySelectorAll('section[id]');
        const footer = document.querySelector('footer');
        if (sections.length >= 7 && footer) {
          observer.disconnect();
          reorderSections();
        }
      });

      const root = document.getElementById('root');
      if (root) {
        observer.observe(root, { childList: true, subtree: true });
      }
    </script>
  </body>
</html>
